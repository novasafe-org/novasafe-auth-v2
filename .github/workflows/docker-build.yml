# Build & deploy the NovaSafe Auth (start.novasafe.io) image.
#
# Pipeline:
#   1. Build the GHCR image, baking VITE_* values from repo secrets so the
#      browser bundle has correct production URLs and RevenueCat keys.
#   2. SSH into the deploy host, pull the new image, and recreate just the
#      `auth` service via the shared docker-compose at DEPLOY_PATH.
#
# Required secrets (Settings → Secrets → Actions):
#
#   SSH_USER                                  Remote SSH login.
#   SSH_HOST                                  Remote host name / IP.
#   SSH_PASSWORD                              Remote SSH password.
#   DEPLOY_PATH                               Absolute path to /opt/novasafe (or wherever).
#
#   VITE_AUTH_URL                             https://start.novasafe.io
#   VITE_APP_URL                              https://app.novasafe.io
#   VITE_LANDING_URL                          https://novasafe.io
#   VITE_API_URL                              https://api.novasafe.io
#   VITE_GOOGLE_WEB_CLIENT_ID                 Google OAuth web client id.
#   VITE_REVENUECAT_PUBLIC_API_KEY_WEB        RevenueCat web SDK public key.
#   VITE_REVENUECAT_ENTITLEMENT_PRO           "pro" (default if unset).
#   VITE_REVENUECAT_PACKAGE_MONTHLY           e.g. "$rc_monthly".
#   VITE_REVENUECAT_PACKAGE_YEARLY            e.g. "$rc_annual".

name: Build & Deploy Auth

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL || 'https://start.novasafe.io' }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL || 'https://app.novasafe.io' }}
            VITE_LANDING_URL=${{ secrets.VITE_LANDING_URL || 'https://novasafe.io' }}
            VITE_API_URL=${{ secrets.VITE_API_URL || 'https://api.novasafe.io' }}
            VITE_GOOGLE_WEB_CLIENT_ID=${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
            VITE_REVENUECAT_PUBLIC_API_KEY_WEB=${{ secrets.VITE_REVENUECAT_PUBLIC_API_KEY_WEB }}
            VITE_REVENUECAT_ENTITLEMENT_PRO=${{ secrets.VITE_REVENUECAT_ENTITLEMENT_PRO || 'pro' }}
            VITE_REVENUECAT_PACKAGE_MONTHLY=${{ secrets.VITE_REVENUECAT_PACKAGE_MONTHLY || '$rc_monthly' }}
            VITE_REVENUECAT_PACKAGE_YEARLY=${{ secrets.VITE_REVENUECAT_PACKAGE_YEARLY || '$rc_annual' }}
            VITE_APP_VERSION=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy Auth to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SERVICE_DIR: platform/auth
          SERVICE_NAME: auth
        run: |
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << EOF
            set -e

            echo "======================================="
            echo "NovaSafe Auth Deployment Started"
            echo "======================================="

            echo "Moving to deployment directory"
            cd ${DEPLOY_PATH}/${SERVICE_DIR}

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in ${SERVICE_DIR}"
              exit 1
            fi

            if [ ! -f .env ]; then
              echo ".env not found — refusing to start without runtime env."
              echo "Copy .env.example to .env on the host before retrying."
              exit 1
            fi

            echo "Detecting docker compose command"
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            echo "Logging into GHCR"
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            echo "Pulling latest image"
            \$DC pull

            echo "Recreating container"
            \$DC up -d --remove-orphans

            echo "Container status"
            docker ps --filter name=${SERVICE_NAME}

            echo "Last 50 container logs"
            docker logs --tail 50 novasafe-auth || true

            echo "Cleaning unused images"
            docker image prune -f || true

            echo "======================================="
            echo "Auth Deployment Completed"
            echo "======================================="
          EOF
