# Deploy auth SSR to AWS (zip Lambda + CloudFront, no ECR)
#
# Auth is TanStack Start with server functions — static S3 upload cannot run login.
# See docs/DEPLOY_AWS.md

name: Deploy AWS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS (production)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      LAMBDA_FUNCTION: novasafe-prod-fn-auth
      S3_BUCKET: novasafe-prod-bucket-auth-793239449172
      CLOUDFRONT_DISTRIBUTION_ID: EH77A1YGQ105X
    steps:
      - name: Validate variables
        run: |
          set -euo pipefail
          for name in AWS_ROLE_ARN AWS_REGION; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing repository variable: $name"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Vendor feature flags catalog
        run: FORCE_FEATURE_FLAG_REVENDOR=1 node scripts/sync-feature-flags-catalog.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout deployment actions
        uses: actions/checkout@v4
        with:
          repository: novasafe-org/novasafe-deployment
          ref: master
          path: _novasafe-deployment
          sparse-checkout: |
            .github/actions/configure-aws
            .github/actions/deploy-lambda
            .github/actions/deploy-s3
            .github/actions/invalidate-cloudfront

      - name: Configure AWS credentials (OIDC)
        uses: ./_novasafe-deployment/.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-auth-v2-deploy

      - name: Package Lambda zip
        run: node scripts/package-lambda.mjs --output dist/lambda.zip

      - name: Deploy Lambda zip
        uses: ./_novasafe-deployment/.github/actions/deploy-lambda
        with:
          function-name: ${{ env.LAMBDA_FUNCTION }}
          artifact-path: dist/lambda.zip
          package-type: ssr

      - name: Sync static assets to S3
        uses: ./_novasafe-deployment/.github/actions/deploy-s3
        with:
          bucket-name: ${{ env.S3_BUCKET }}
          source-directory: dist/client
          require-index-html: "false"

      - name: Invalidate CloudFront cache
        uses: ./_novasafe-deployment/.github/actions/invalidate-cloudfront
        with:
          distribution-id: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}
          paths: /*

      - name: Smoke test /login
        run: |
          set -euo pipefail
          sleep 5
          STATUS="$(curl -sS -o /tmp/login.html -w '%{http_code}' https://start.novasafe.io/login)"
          echo "HTTP $STATUS"
          head -20 /tmp/login.html
          if [ "$STATUS" != "200" ]; then
            echo "::error::/login returned HTTP $STATUS"
            exit 1
          fi
          if ! grep -qi '<html' /tmp/login.html; then
            echo "::error::/login did not return HTML"
            exit 1
          fi
