# Deploy auth SSR to AWS (Lambda container + CloudFront)
#
# Auth is TanStack Start with server functions — static S3 upload cannot run login.
# See docs/DEPLOY_AWS.md

name: Deploy AWS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS (production)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: novasafe-prod-ecr-auth
      LAMBDA_FUNCTION: novasafe-prod-fn-auth
      CLOUDFRONT_DISTRIBUTION_ID: EH77A1YGQ105X
    steps:
      - name: Validate variables
        run: |
          set -euo pipefail
          for name in AWS_ROLE_ARN AWS_REGION; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing repository variable: $name"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Checkout deployment actions
        uses: actions/checkout@v4
        with:
          repository: novasafe-org/novasafe-deployment
          ref: master
          path: _novasafe-deployment
          sparse-checkout: |
            .github/actions/configure-aws
            .github/actions/invalidate-cloudfront

      - name: Configure AWS credentials (OIDC)
        uses: ./_novasafe-deployment/.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: novasafe-auth-v2-deploy

      - name: Login to Amazon ECR
        id: ecr
        run: |
          set -euo pipefail
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/${ECR_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Lambda image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.lambda
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.ecr.outputs.image }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ vars.VITE_APP_VERSION || '1.1.3' }}
            BUILD_NUMBER=${{ github.run_id }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            REPOSITORY=novasafe-auth-v2

      - name: Update Lambda function image
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION" \
            --image-uri "${{ steps.ecr.outputs.image }}"
          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION"
          echo "✔ Updated Lambda: $LAMBDA_FUNCTION"

      - name: Invalidate CloudFront cache
        uses: ./_novasafe-deployment/.github/actions/invalidate-cloudfront
        with:
          distribution-id: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}
          paths: /*

      - name: Smoke test /login
        run: |
          set -euo pipefail
          sleep 5
          STATUS="$(curl -sS -o /tmp/login.html -w '%{http_code}' https://start.novasafe.io/login)"
          echo "HTTP $STATUS"
          head -20 /tmp/login.html
          if [ "$STATUS" != "200" ]; then
            echo "::error::/login returned HTTP $STATUS"
            exit 1
          fi
          if ! grep -qi '<html' /tmp/login.html; then
            echo "::error::/login did not return HTML"
            exit 1
          fi
