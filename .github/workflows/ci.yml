# Gitleaks → Build → Trivy → push → deploy (single pipeline)
#
# Env on VPS: /opt/novasafe-deployment/platform/auth/.env

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  gitleaks:
    name: Gitleaks
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gitleaks-cli

  build-image:
    name: Build (image)
    needs: gitleaks
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: version
        uses: novasafe-org/novasafe-deployment/.github/actions/resolve-version@master
        with:
          package-json: package.json
          repository-name: novasafe-auth-v2
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: novasafe-auth:scan
          push: false
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_NUMBER=${{ steps.version.outputs.build }}
            GIT_COMMIT=${{ steps.version.outputs.commit }}
            RELEASED_AT=${{ steps.version.outputs.released_at }}
            GIT_BRANCH=${{ github.ref_name }}
            REPOSITORY=novasafe-auth-v2
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Save image for Trivy
        run: docker save novasafe-auth:scan | gzip > app-image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: app-image.tar.gz
          retention-days: 1

  trivy-image:
    name: Trivy (image)
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-image
      - name: Load image
        run: docker load -i app-image.tar.gz
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: novasafe-auth:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  push-image:
    name: Push (GHCR)
    needs: trivy-image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: version
        uses: novasafe-org/novasafe-deployment/.github/actions/resolve-version@master
        with:
          package-json: package.json
          repository-name: novasafe-auth-v2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_NUMBER=${{ steps.version.outputs.build }}
            GIT_COMMIT=${{ steps.version.outputs.commit }}
            RELEASED_AT=${{ steps.version.outputs.released_at }}
            GIT_BRANCH=${{ github.ref_name }}
            REPOSITORY=novasafe-auth-v2
          tags: |
            ghcr.io/novasafe-org/novasafe-auth-v2:latest
            ghcr.io/novasafe-org/novasafe-auth-v2:${{ github.sha }}
            ghcr.io/novasafe-org/novasafe-auth-v2:${{ steps.version.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: push-image
    if: github.event_name == 'push'
    uses: novasafe-org/novasafe-deployment/.github/workflows/deploy-service.yml@master
    with:
      service: auth
      caller_repo: ${{ github.repository }}
      caller_ref: ${{ github.ref_name }}@${{ github.sha }}
    secrets: inherit

  github-release:
    name: GitHub Release
    needs: deploy
    if: github.event_name == 'push'
    permissions:
      contents: write
    uses: novasafe-org/novasafe-deployment/.github/workflows/publish-github-release.yml@master
    with:
      package-json: package.json
      changelog-path: CHANGELOG.md
